version: "3.8"

services: 
  
  postgres:
    image: postgres:16-alpine
    container_name: fraud-postgres
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  fraud_api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: fraud_api
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres
      API_HOST: fraud_api
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: fraud_dashboard
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres
      API_HOST: fraud_api
    ports:
      - "8501:8501"
    depends_on:
      - fraud_api
    restart: unless-stopped
  
volumes:
  pgdata: